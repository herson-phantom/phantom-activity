    .nav-item.active { background: #F0F0F0; color: #111; font-weight: 400; }
    .nav-dot { display: none; }
    .nav-divider { display: none; }

    .toggle-switch { width: 32px; height: 18px; border-radius: 9px; background: #ccc; cursor: pointer; position: relative; transition: background 0.15s ease; flex-shrink: 0; outline: none; touch-action: manipulation; }
    .toggle-switch:focus-visible { box-shadow: 0 0 0 2px #AB9FF2; }
    .toggle-knob { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: left 0.15s ease; }
    .toggle-switch.on { background: #AB9FF2; } .toggle-switch.on .toggle-knob { left: 16px; }

    .section-line { flex: 1; height: 0.5px; background: #242424; }
    .row { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 0.5px solid #1a1a1a; min-height: 44px; transition: background 0.1s ease; }

    .row-name { font-size: 16px; font-weight: 500; line-height: 20px; letter-spacing: -0.1px; color: #E3E4E4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .row-sub  { font-size: 14px; font-weight: 400; line-height: 18px; letter-spacing: 0; color: #B3B3B3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .row-amount { font-size: 16px; font-weight: 500; line-height: 20px; letter-spacing: -0.1px; white-space: nowrap; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .empty { padding: 40px 20px; text-align: center; color: #444; font-size: 14px; }

    .right-panel-title { align-self: stretch; color: #000; font-family: "SF Pro Display", -apple-system, sans-serif; font-size: 20px; font-style: normal; font-weight: 500; line-height: 24px; letter-spacing: 0; text-wrap: balance; }

  if (state === 'declined') return '#d95c5c';
  if (state === 'none') return '#444';
  if (state === 'neutral') return '#606060';
  if (amount && amount.startsWith('+')) return '#45E863';
  return '#f0f0f0';
}

function buildAvatarHtml(tx, useAction) {
  const wrapIcon = (inner) =>
    `<div style="display:flex;width:40px;height:40px;padding:9px;justify-content:center;align-items:center;border-radius:9999px;border:1px solid rgba(255,255,255,0.03);background:linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.05) 100%), rgba(0,0,0,0.50);box-sizing:border-box;flex-shrink:0;">${inner}</div>`;
  const wrapImg = (inner) =>
    `<div style="display:flex;width:40px;height:40px;padding:0;justify-content:center;align-items:center;border-radius:9999px;border:1px solid rgba(255,255,255,0.03);overflow:hidden;box-sizing:border-box;flex-shrink:0;"><div style="flex:1 0 0;align-self:stretch;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;overflow:hidden;">${inner}</div></div>`;
  const wrap = wrapIcon;
  if (useAction) {
    const a = tx.actionIcon||'generic';
    if (a==='recurring')   return wrapActionIcon(ICON_RECURRING);
    if (a==='open-pos')    return wrapActionIcon(ICON_OPEN_POS);
    if (a==='close-pos')   return wrapActionIcon(ICON_CLOSE_POS);
    if (a==='liquidated')  return wrapActionIcon(ICON_LIQUIDATED);
    if (a==='limit-buy')   return wrapActionIcon(ICON_LIMIT_BUY);
    if (a==='ladder-in')   return wrapActionIcon(ICON_LADDER_IN);
    if (a==='take-profit') return wrapActionIcon(ICON_TAKE_PROFIT);
    if (a==='stop-loss')   return wrapActionIcon(ICON_STOP_LOSS);
    if (a==='ladder-out')  return wrapActionIcon(ICON_LADDER_OUT);
    if (a==='swap')        return wrapActionIcon(ICON_SWAP);
    if (a==='cancel')       return wrapActionIcon(ICON_CANCEL);
    if (a==='wallet')       return wrapIcon(WALLET_SVG);
    if (a==='deactivate')      return wrapActionIcon(ICON_DEACTIVATE);
    if (a==='recover')         return wrapActionIcon(ICON_RECOVER);
    if (a==='bridge')          return wrapActionIcon(ICON_BRIDGE);
    if (a==='burn')            return wrapActionIcon(ICON_BURN);
    if (a==='dca')             return wrapActionIcon(ICON_DCA);
    if (a==='limit-order')     return wrapActionIcon(ICON_LIMIT_ORDER);
    if (a==='stake')           return wrapActionIcon(ICON_STAKE);
    if (a==='withdraw-stake')  return wrapActionIcon(ICON_WITHDRAW_STAKE);
    return `<div style="width:40px;height:40px;border-radius:50%;background:#1e1e1e;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="3" fill="#555"/></svg></div>`;
  }
  if (tx.icon==='phantom')       return wrapImg(PHANTOM_SVG);
  if (tx.icon==='bank')          return wrapIcon(BANK_SVG);
  if (tx.icon==='perps'||tx.icon==='perps-nobadge') return wrapImg(PERPS_IMG_SVG);
  if (tx.icon==='swap'||tx.icon==='sol') return wrapImg(SOL_IMG);
  if (tx.icon==='bonk') return wrapImg(BONK_IMG);
  if (tx.icon==='usdc'||tx.icon==='usdc-nobadge') return wrapImg(USDC_IMG);
  if (tx.icon==='btc')           return wrapImg(BTC_IMG);
  if (tx.icon==='prediction')    return wrapImg(PRED_IMG);
  if (tx.icon==='nft')           return wrap(DINO_IMG);
  if (tx.icon==='username')      return wrapImg(USERNAME_IMG);
  if (tx.icon==='bear')          return wrapImg(BEAR_IMG);
  if (tx.icon==='fox')           return wrapImg(FOX_IMG);
  if (tx.icon==='eth')           return wrapImg(ETH_IMG);
  if (tx.icon==='ghost')         return wrapImg(GHOST_SVG);
  if (tx.icon==='wallet')        return wrapIcon(WALLET_SVG);
  if (tx.icon==='doordash')      return DOORDASH_SVG;
  return wrapIcon(WALLET_SVG);
}

function selectPage(id) {
  activePage=id; legendFilter='all'; assetScreen=false;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const n=document.getElementById('nav-'+id); if(n) n.classList.add('active');
  render();
}
function setFilter(f) { legendFilter=f; render(); }
function toggleAssetScreen() { assetScreen=!assetScreen; render(); }

function render() {
  const phone=document.getElementById('phone');
  const page=pages[activePage];
  const useAction=(page.hasToggle&&assetScreen)||!!page.alwaysActionIcons;
  const dates=['Jan 3','Feb 14','Mar 22','Apr 17','May 8','Jun 30'];
  let dateIdx=0;

  const pillDefs=[
    {id:'all',      label:'All'},
    {id:'moneyin',  label:'Money In'},
    {id:'moneyout', label:'Money Out'},
    {id:'pending',  label:'Pending'},
    {id:'declined', label:'Declined'},
  ];
  const pillsHtml=pillDefs.map(p=>
    `<button class="pill${legendFilter===p.id?' active':''}" onclick="setFilter('${p.id}')">${p.label}</button>`
  ).join('');

  const toggleHtml=page.hasToggle?`
    <div class="toggle-bar">
      <span>Asset screen icons</span>
      <div class="toggle-switch${assetScreen?' on':''}" onclick="toggleAssetScreen()" role="switch" aria-checked="${assetScreen}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){toggleAssetScreen();}">
        <div class="toggle-knob"></div>
      </div>
    </div>`:'';

  let rowsHtml='';
  page.cats.forEach(catId=>{
    const txs=data.transactions[catId]||[];
    const grouped={},groupOrder=[];
    // When asset screen icons are on, filter to only asset-relevant groups
    const allowedGroups = (useAction && page.assetGroups) ? (page.assetGroups[catId] !== undefined ? page.assetGroups[catId] : null) : null;
    txs.forEach(tx=>{
      const grp=tx.group||tx.mockSub||'Other';
      if(allowedGroups !== null && allowedGroups !== undefined && !allowedGroups.includes(grp)) return;
      // On token screen, only show SOL-relevant transactions (tokenscreen cat is always allowed)
      if(page.solanaOnly && catId!=='tokenscreen' && tx.icon!=='sol' && tx.icon!=='swap') return;
      const matching=legendFilter==='all'?tx.states:tx.states.filter(s=>s.s===legendFilter);
      if(!matching.length) return;
      if(!grouped[grp]){grouped[grp]=[];groupOrder.push(grp);}
      grouped[grp].push({tx,matching});
    });
    groupOrder.forEach(grp=>{
      rowsHtml+=`<div class="section-head"><span class="section-label">${grp}</span><div class="section-line"></div></div>`;
      grouped[grp].forEach(({tx,matching})=>{
        matching.forEach(st=>{
          const d=dates[dateIdx%dates.length]+', 2026'; dateIdx++;
          const isDeclined=st.s==='declined';
          const isNeutralTx=tx.states.every(s=>s.s==='neutral'||s.s==='pending')&&tx.states.some(s=>s.s==='neutral');
          const subText=st.s==='pending'?'Pending'
            :st.s==='hold'?`Hold · ${d}`
            :isDeclined?`<span style="color:#d95c5c;">Declined</span> · ${d}`
            :st.s==='failed-tx'?`<span style="color:#d95c5c;">Failed</span> · ${d}`
            :(tx.mockSub==='Predictions'||page.alwaysActionIcons?d:`${tx.mockSub} · ${d}`);
          const amtStyle=(isDeclined||st.s==='strikethrough'||st.s==='failed-tx')
            ?'color:#606060;text-decoration:line-through;'
            :(st.s==='hold'||st.s==='neutral'||(st.s==='pending'&&isNeutralTx))
              ?'color:#606060;'
              :`color:${getAmtColor(st.s,st.amount)};`;
          rowsHtml+=`<div class="row">
            ${buildAvatarHtml(tx,useAction)}
            <div class="row-info">
              <div class="row-name">${tx.mockTitle}</div>
              <div class="row-sub">${subText}</div>
            </div>
            <div class="row-amount" style="${amtStyle}">${st.amount}</div>
          </div>`;
        });
      });
    });
  });

  if(!rowsHtml) rowsHtml='<div class="empty">No transactions match this filter</div>';

  // Render right panel: title + filters + toggle + inline logic
  const logic = pageLogic[activePage];
  const logicHtml = logic ? logic.sections.map(sec => `
    <div class="logic-section">
      <div class="logic-section-title">${sec.title}</div>
      ${sec.rules.map(rule => {
        const leadingStrong = rule.match(/^<strong>(.*?)<\/strong>\s*(?:—\s*)?(.*)$/s);
        if (leadingStrong) {
          const title = leadingStrong[1];
          const desc = (leadingStrong[2] || '').trim();
          return `<div class="logic-rule"><div class="logic-rule-title">${title}</div>${desc ? `<div class="logic-rule-desc">${desc}</div>` : ''}</div>`;
        }
        const dashSplit = rule.split(/\s*—\s*/);
        if (dashSplit.length >= 2) {
          const title = dashSplit[0].trim();
          const desc = dashSplit.slice(1).join(' — ').trim();
          return `<div class="logic-rule"><div class="logic-rule-title">${title}</div>${desc ? `<div class="logic-rule-desc">${desc}</div>` : ''}</div>`;
        }
        return `<div class="logic-rule"><div class="logic-rule-title">${rule}</div></div>`;
      }).join('')}
    </div>`).join('') : '';
  const rightPanel = document.getElementById('pageRightPanel');
  rightPanel.innerHTML = `
    <div class="right-panel-title">${page.title}</div>
    <div class="filter-bar">${pillsHtml}</div>
    ${toggleHtml}
    <div class="right-logic">${logicHtml}</div>
  `;
  rightPanel.classList.remove('page-fade');
  void rightPanel.offsetWidth;
  rightPanel.classList.add('page-fade');
  // Render transactions inside phone
  const scrollBody = document.createElement('div');
  scrollBody.className = 'phone-scroll-body page-fade';
  scrollBody.innerHTML = rowsHtml;
  phone.innerHTML = '';
  phone.appendChild(scrollBody);
}
